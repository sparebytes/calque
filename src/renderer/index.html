<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calque</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="titlebar" id="titlebar" data-interactive="true">
      <div class="titlebar-side" id="titlebarLeft">
        <button class="tb-btn" id="panelToggle" title="Collapse panel">&#8249;</button>
        <span class="titlebar-title" id="titlebarTitle">Calque</span>
      </div>
      <div class="titlebar-side" id="titlebarRight"></div>
      <!-- Moved into the left (macOS traffic-light style) or right side by JS. -->
      <div class="window-controls" id="windowControls">
        <button class="wc wc-close" id="btnClose" title="Close">&#10005;</button>
        <button class="wc wc-min" id="btnMinimize" title="Minimize">&#8722;</button>
        <button class="wc wc-max" id="btnMaximize" title="Zoom">&#43;</button>
      </div>
    </div>

    <div class="app-body">
      <div class="panel" id="panel" data-interactive="true">
        <div class="panel-section panel-top">
          <button class="btn-move" id="btnPanelSide">Move panel to right ⇥</button>
        </div>

        <div class="panel-section">
          <div class="section-label">Images</div>
          <div class="image-list" id="imageList"></div>
          <div class="panel-actions">
            <button class="btn-open" id="btnOpenFile">+ Open file</button>
          </div>
        </div>

        <div class="panel-section settings-section" id="settingsSection">
          <div class="section-label">Settings</div>

          <label class="setting-check" id="displayScaleRow">
            <input type="checkbox" id="displayScale" checked />
            <span class="setting-check-text">
              Match display scale
              <span class="setting-check-hint" id="displayScaleHint"></span>
            </span>
          </label>

          <div class="setting">
            <div class="setting-head">
              <label>Scale</label>
              <div class="num-wrap">
                <input type="number" class="num" id="scaleNum" min="10" max="300" step="1" />
                <span class="unit">%</span>
              </div>
            </div>
            <input type="range" id="scale" min="10" max="300" value="100" step="1" />
          </div>

          <div class="setting">
            <div class="setting-head">
              <label>Opacity</label>
              <div class="num-wrap">
                <input type="number" class="num" id="opacityNum" min="0" max="100" step="1" />
                <span class="unit">%</span>
              </div>
            </div>
            <input type="range" id="opacity" min="0" max="100" value="50" step="1" />
          </div>

          <div class="setting">
            <div class="setting-head">
              <label>Hue</label>
              <div class="num-wrap">
                <input type="number" class="num" id="hueNum" min="0" max="360" step="1" />
                <span class="unit">&deg;</span>
              </div>
            </div>
            <input type="range" id="hue" min="0" max="360" value="0" step="1" />
          </div>

          <div class="setting">
            <div class="setting-head">
              <label>X offset</label>
              <div class="num-wrap">
                <input type="number" class="num" id="xNum" step="1" />
                <span class="unit">px</span>
              </div>
            </div>
            <input type="range" id="x" min="-1000" max="1000" value="0" step="1" />
          </div>

          <div class="setting">
            <div class="setting-head">
              <label>Y offset</label>
              <div class="num-wrap">
                <input type="number" class="num" id="yNum" step="1" />
                <span class="unit">px</span>
              </div>
            </div>
            <input type="range" id="y" min="-1000" max="1000" value="0" step="1" />
          </div>

          <button class="btn-move" id="btnMove">Reposition image</button>
        </div>
      </div>

      <div class="overlay-area" id="overlayArea">
        <img class="overlay-image" id="overlayImage" src="" alt="" draggable="false" />
      </div>

      <!-- Shown only when no image is loaded. -->
      <div class="empty-state" id="emptyState" data-interactive="true">
        <div class="empty-box" id="emptyBox">
          <div class="empty-box-icon">&#128247;</div>
          <div class="empty-box-title">No image loaded</div>
          <div class="empty-box-sub">Open an image to compare against your UI</div>
          <button class="btn-open" id="btnOpenFileEmpty">+ Open file</button>
        </div>
      </div>
    </div>

    <script type="module" src="renderer.ts"></script>
  </body>
</html>
